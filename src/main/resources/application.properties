spring.application.name=chatbot

server.port=8080

spring.datasource.url=jdbc:mysql://localhost/chatbot
## todo alterar user para uso
spring.datasource.username=root
## todo alterar senha para uso
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

api.security.token.secret=${JWT_TOKEN:4206769}

## desabilitar(never)/habilitar(always) log de erros em requisicoes
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

## habilitar log de autenticacaoes
# logging.level.org.springframework.security=DEBUG

## tratar rotas inexistentes
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

